<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Good Luck Alexa!</title>
    <style>
        /* Rich Deep Purple Background */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at center, #42275a 0%, #1e102e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; /* Keeps animated particles inside */
        }

        /* --- ENHANCED STARDUST ANIMATION --- */
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .star {
            position: absolute;
            /* Made the stars larger and much brighter */
            width: 6px; 
            height: 6px;
            background: rgba(255, 240, 180, 0.95); 
            border-radius: 50%;
            /* Stronger glowing aura */
            box-shadow: 0 0 15px 3px rgba(255, 230, 150, 0.8);
            animation: floatUp linear infinite;
            bottom: -20px;
        }

        /* Added more stars with varying speeds and start times for a richer effect */
        .star:nth-child(1) { left: 5%; animation-duration: 8s; animation-delay: 0s; transform: scale(0.8); }
        .star:nth-child(2) { left: 15%; animation-duration: 12s; animation-delay: 4s; transform: scale(1.2); }
        .star:nth-child(3) { left: 25%; animation-duration: 7s; animation-delay: 1s; transform: scale(0.6); }
        .star:nth-child(4) { left: 35%; animation-duration: 14s; animation-delay: 6s; transform: scale(1.5); }
        .star:nth-child(5) { left: 45%; animation-duration: 9s; animation-delay: 2s; transform: scale(1); }
        .star:nth-child(6) { left: 55%; animation-duration: 11s; animation-delay: 8s; transform: scale(0.9); }
        .star:nth-child(7) { left: 65%; animation-duration: 8s; animation-delay: 3s; transform: scale(1.3); }
        .star:nth-child(8) { left: 75%; animation-duration: 13s; animation-delay: 7s; transform: scale(0.7); }
        .star:nth-child(9) { left: 85%; animation-duration: 10s; animation-delay: 1s; transform: scale(1.1); }
        .star:nth-child(10) { left: 95%; animation-duration: 15s; animation-delay: 5s; transform: scale(1.4); }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            10% { opacity: 1; } /* Fades in much faster now */
            80% { opacity: 1; } /* Stays visible longer */
            100% { transform: translateY(-110vh) scale(1.2); opacity: 0; }
        }

        /* --- REST OF THE UI --- */
        /* Creamy, Elegant Card */
        .card {
            background: linear-gradient(135deg, #fdfbf7 0%, #f4efe1 100%);
            padding: 40px 50px 50px 50px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            text-align: center;
            max-width: 600px;
            width: 85%;
            position: relative;
            z-index: 1;
            /* Entrance Animation */
            animation: slideFadeIn 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        @keyframes slideFadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Top Right Close Button */
        .close-btn {
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 20px;
            color: #888;
            cursor: pointer;
            text-decoration: none;
            transition: color 0.3s;
        }
        .close-btn:hover { color: #333; }

        /* Animated Golden Photo Halo */
        .image-container {
            width: 140px;
            height: 140px;
            margin: 0 auto 20px auto;
            border-radius: 50%;
            background: transparent;
            border: 4px solid rgba(212, 175, 55, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            /* Pulsing Glow Animation */
            animation: goldPulse 2.5s infinite alternate;
        }

        @keyframes goldPulse {
            from { box-shadow: 0 0 10px rgba(212, 175, 55, 0.2), inset 0 0 10px rgba(212, 175, 55, 0.2); }
            to { box-shadow: 0 0 25px rgba(212, 175, 55, 0.8), inset 0 0 20px rgba(212, 175, 55, 0.6); }
        }

        .profile-photo {
            max-width: 85%;
            max-height: 85%;
            object-fit: contain;
            border-radius: 50%; 
        }

        /* Floating Icons Animation */
        .icons {
            font-size: 40px;
            margin-bottom: 10px;
            display: flex;
            justify-content: center;
            gap: 10px;
            animation: floatBob 3s ease-in-out infinite;
        }

        @keyframes floatBob {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* Sophisticated Serif Typography */
        h1 {
            color: #2b1d3d;
            margin: 0 0 10px 0;
            font-size: 2.1em;
            font-family: Georgia, 'Times New Roman', Times, serif;
            line-height: 1.3;
        }

        /* Decorative Compass Divider */
        .divider {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 15px 0 20px 0;
        }
        .divider::before, .divider::after {
            content: "";
            height: 1px;
            width: 60px;
            background-color: #d1c8b4;
            margin: 0 15px;
        }
        .divider-icon {
            color: #8c7f66;
            font-size: 20px;
        }

        /* Subtext */
        p {
            font-size: 1.05em;
            color: #555;
            margin-bottom: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Bottom Right Share Button */
        .share-btn {
            position: absolute;
            bottom: 25px;
            right: 30px;
            font-size: 16px;
            color: #7b6a58;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .share-btn:hover {
            color: #2b1d3d;
            transform: translateX(3px); 
        }
    </style>
</head>
<body>

    <div class="stars">
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
    </div>

    <div class="card">
        <a href="#" class="close-btn" title="Close">✕</a>

        <div class="image-container">
            <img src="l.png" alt="Alexa" class="profile-photo">
        </div>

        <div class="icons">
            <span>💼</span>
            <span>✨</span>
        </div>

        <h1>Good luck Alexa in your job<br>interview 123 ABC!</h1>

        <div class="divider">
            <span class="divider-icon">❂</span>
        </div>

        <p>You've got this. Take a deep breath and show them what you can do!</p>

        <a href="#" class="share-btn" title="Share">Share ➔</a>
    </div>

</body>
</html>
